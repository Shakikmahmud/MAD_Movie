<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Library App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2 class="mb-4 text-center">Login</h2>
        <input type="text" id="loginUsername" class="form-control mb-3" placeholder="Username">
        <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-dark w-100" onclick="loginUser()">Login</button>
        <p class="mt-3 text-center">No account? <a href="/register-page">Register</a></p>
        <div id="loginMessage" class="mt-3 text-center text-danger"></div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
